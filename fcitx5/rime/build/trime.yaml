style:
  auto_caps: false
  background_dim_amount: 0.5
  candidate_font: han.ttf
  candidate_padding: 5
  candidate_spacing: 0.5
  candidate_text_size: 22
  candidate_use_cursor: true
  candidate_view_height: 28
  color_scheme: default
  comment_font: comment.ttf
  comment_height: 12
  comment_on_top: true
  comment_text_size: 12
  enter_label_mode: 0
  enter_labels:
    default: Enter
    done: "完成"
    go: "前往"
    next: "下个"
    pre: "上个"
    search: "搜索"
    send: "发送"
  hanb_font: hanb.ttf
  horizontal: true
  horizontal_gap: 1
  key_font: symbol.ttf
  key_height: 44
  key_long_text_border: 1
  key_long_text_size: 14
  key_text_size: 22
  key_width: 10.0
  keyboard_height: 250
  keyboard_height_land: 200
  keyboard_padding: 0
  keyboard_padding_bottom: 0
  keyboard_padding_land: 40
  keyboard_padding_land_bottom: 0
  keyboard_padding_left: 0
  keyboard_padding_right: 40
  keyboards:
    - .default
    - letter
    - number
    - symbols
    - mini
  label_font: label.ttf
  label_text_size: 22
  latin_font: latin.ttf
  latin_locale: en_US
  layout:
    all_phrases: false
    alpha: 0xdd
    border: 2
    elevation: 5
    line_spacing: 0
    line_spacing_multiplier: 1.2
    margin_bottom: 0
    margin_x: 5
    margin_y: 5
    max_entries: 1
    max_height: 400
    max_length: 10
    max_width: 230
    min_check: 3
    min_height: 0
    min_length: 5
    min_width: 40
    movable: once
    position: fixed
    real_margin: 3
    round_corner: 8
    spacing: 1
    sticky_lines: 0
    sticky_lines_land: 0
  liquid_keyboard_window:
    - {click: space, label: " 空格 ", start: ""}
    - {click: BackSpace, label: " 删除 ", start: ""}
    - {click: Return, label: " 回车 ", start: ""}
    - {click: liquid_keyboard_exit, label: " 返回 ", start: ""}
  locale: zh_TW
  long_text_font: comment.ttf
  preview_font: latin.ttf
  preview_height: 60
  preview_offset: "-12"
  preview_text_size: 40
  proximity_correction: true
  reset_ascii_mode: false
  round_corner: 8
  shadow_radius: 0.0
  speech_opencc_config: s2t.json
  symbol_font: symbol.ttf
  symbol_text_size: 10
  text_font: latin.ttf
  text_size: 16
  vertical_correction: "-10"
  vertical_gap: 1
  window:
    - {end: "", move: "ㄓ ", start: ""}
    - {composition: "%s", end: "", letter_spacing: 0, start: ""}
    - {candidate: "%s", comment: " %s", end: "", label: "%s.", sep: " ", start: "\n"}